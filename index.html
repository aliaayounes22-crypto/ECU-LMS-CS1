<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ECU LMS – Egyptian Chinese University</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --red:#c0392b; --red2:#e74c3c; --grey:#5d6577; --lightgrey:#f4f5f7;
  --white:#ffffff; --dark:#1a1a2e; --border:#e2e5ec; --muted:#8f96a8;
  --font-h:'Playfair Display',serif; --font-b:'Outfit',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--lightgrey);color:var(--dark);font-family:var(--font-b);min-height:100vh}

/* LOGIN */
#login-screen{
  display:flex;min-height:100vh;
  background: linear-gradient(135deg,#1a1a2e 0%,#2c1810 50%,#1a1a2e 100%);
  position:relative;overflow:hidden;
}
#login-screen::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c0392b' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.login-left{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px;position:relative;
}
.login-left-inner{text-align:center;animation:fadeUp .8s ease both;}
.ecu-logo-big{width:220px;filter:drop-shadow(0 20px 40px rgba(0,0,0,.5));margin-bottom:28px;}
.login-tagline{color:rgba(255,255,255,.5);font-size:.9rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;}
.login-headline{font-family:var(--font-h);font-size:2.6rem;color:#fff;line-height:1.2;margin-bottom:12px;}
.login-headline span{color:var(--red2);}
.login-divider{width:60px;height:3px;background:var(--red);margin:0 auto 16px;border-radius:2px;}
.login-desc{color:rgba(255,255,255,.4);font-size:.88rem;max-width:320px;line-height:1.6;}

.login-right{
  width:460px;background:var(--white);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:52px 48px;
  box-shadow:-40px 0 80px rgba(0,0,0,.3);position:relative;
}
.login-right::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:linear-gradient(to bottom,var(--red),transparent,var(--red));
}
.cis-logo-login{width:80px;margin-bottom:20px;}
.login-form-title{font-family:var(--font-h);font-size:1.8rem;color:var(--dark);margin-bottom:4px;}
.login-form-sub{color:var(--muted);font-size:.85rem;margin-bottom:32px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:.75rem;font-weight:600;color:var(--grey);margin-bottom:7px;letter-spacing:.07em;text-transform:uppercase;}
.field input,.field select{
  width:100%;background:#fafbfc;border:1.5px solid var(--border);border-radius:10px;
  color:var(--dark);font-family:var(--font-b);font-size:.95rem;padding:13px 16px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus,.field select:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-b);font-size:.9rem;font-weight:600;transition:all .2s;text-decoration:none;}
.btn-red{background:var(--red);color:#fff;width:100%;justify-content:center;font-size:1rem;padding:14px;letter-spacing:.02em;}
.btn-red:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(192,57,43,.35);}
.btn-sm{background:#f4f5f7;color:var(--grey);border:1.5px solid var(--border);padding:8px 14px;font-size:.82rem;}
.btn-sm:hover{border-color:var(--red);color:var(--red);}
.btn-danger{background:#fff5f5;color:var(--red);border:1.5px solid #ffc9c9;}
.btn-danger:hover{background:#ffe3e3;}
.btn-success{background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0;}
.btn-success:hover{background:#dcfce7;}
.demo-row{display:flex;gap:8px;margin-top:20px;padding-top:18px;border-top:1px solid var(--border);}
.demo-lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.demo-btn{flex:1;background:#fafbfc;border:1.5px solid var(--border);color:var(--grey);border-radius:8px;padding:8px;font-size:.78rem;cursor:pointer;font-family:var(--font-b);transition:all .2s;text-align:center;}
.demo-btn:hover{border-color:var(--red);color:var(--red);}
.err{background:#fff5f5;border:1.5px solid #ffc9c9;color:var(--red);border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:14px;display:none;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{
  background:var(--white);border-bottom:2px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:68px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.topbar-brand{display:flex;align-items:center;gap:14px;}
.topbar-cis{height:44px;}
.topbar-ecu{height:36px;}
.topbar-sep{width:1px;height:36px;background:var(--border);}
.topbar-text{font-family:var(--font-h);font-size:1.2rem;color:var(--dark);}
.topbar-text span{color:var(--red);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.role-badge{font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:4px 12px;border-radius:20px;}
.role-Admin{background:#fff0ee;color:var(--red);border:1.5px solid #ffd0cb;}
.role-Instructor{background:#eff6ff;color:#2563eb;border:1.5px solid #bfdbfe;}
.role-Student{background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0;}

.layout{display:flex;flex:1;}
.sidebar{
  width:230px;background:var(--white);border-right:1.5px solid var(--border);
  padding:20px 12px;display:flex;flex-direction:column;gap:2px;
  position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto;
}
.sidebar-logo{padding:12px 14px 20px;border-bottom:1px solid var(--border);margin-bottom:10px;text-align:center;}
.sidebar-logo img{height:56px;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:10px;
  color:var(--muted);font-size:.87rem;font-weight:500;cursor:pointer;
  transition:all .2s;border:1.5px solid transparent;
}
.nav-item:hover{background:#fff5f4;color:var(--red);}
.nav-item.active{background:#fff0ee;color:var(--red);border-color:#ffd0cb;}
.nav-item .icon{font-size:1rem;width:20px;text-align:center;}
.nav-section{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:14px 14px 5px;}

.main{flex:1;padding:32px;overflow-y:auto;}
.page{display:none;animation:fadeUp .3s ease both;}
.page.active{display:block;}

.page-title{font-family:var(--font-h);font-size:2rem;margin-bottom:4px;color:var(--dark);}
.page-sub{color:var(--muted);font-size:.88rem;margin-bottom:28px;}

/* WELCOME BANNER */
.welcome-banner{
  background:linear-gradient(135deg,var(--dark) 0%,#2c1810 100%);
  border-radius:18px;padding:28px 32px;margin-bottom:28px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
  box-shadow:0 10px 40px rgba(26,26,46,.25);
}
.welcome-banner::after{
  content:'ECU';position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  font-family:var(--font-h);font-size:8rem;color:rgba(255,255,255,.04);font-weight:700;line-height:1;
  letter-spacing:-4px;pointer-events:none;
}
.welcome-banner h2{font-family:var(--font-h);font-size:1.6rem;color:#fff;margin-bottom:4px;}
.welcome-banner p{color:rgba(255,255,255,.5);font-size:.88rem;}
.welcome-banner-logo{height:64px;filter:brightness(0) invert(1) opacity(.2);}
.red-bar{width:4px;height:40px;background:var(--red);border-radius:2px;margin-right:16px;flex-shrink:0;}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{
  background:var(--white);border:1.5px solid var(--border);border-radius:14px;
  padding:20px 22px;position:relative;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 14px 14px;
}
.stat-card.red::after{background:var(--red);}
.stat-card.blue::after{background:#3b82f6;}
.stat-card.green::after{background:#22c55e;}
.stat-card.orange::after{background:#f97316;}
.stat-num{font-family:var(--font-h);font-size:2.2rem;line-height:1;color:var(--dark);}
.stat-label{color:var(--muted);font-size:.78rem;margin-top:5px;}

.card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.card-title{font-size:.95rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;color:var(--dark);}
.card-title-left{display:flex;align-items:center;gap:8px;}
.card-title-bar{width:3px;height:18px;background:var(--red);border-radius:2px;}

table{width:100%;border-collapse:collapse;font-size:.87rem;}
th{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600;padding:10px 14px;text-align:left;border-bottom:1.5px solid var(--border);background:#fafbfc;}
td{padding:12px 14px;border-bottom:1px solid #f0f2f5;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbfc;}
thead tr th:first-child{border-radius:8px 0 0 0;}
thead tr th:last-child{border-radius:0 8px 0 0;}

.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.73rem;font-weight:600;}
.tag-red{background:#fff0ee;color:var(--red);}
.tag-blue{background:#eff6ff;color:#2563eb;}
.tag-green{background:#f0fdf4;color:#16a34a;}
.tag-grey{background:#f4f5f7;color:var(--grey);}

.progress-bar{background:#f0f2f5;border-radius:20px;height:6px;overflow:hidden;}
.progress-fill{height:100%;background:var(--red);border-radius:20px;transition:width .6s ease;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease;}
.modal{background:var(--white);border-radius:18px;padding:32px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:fadeUp .25s ease both;box-shadow:0 40px 80px rgba(0,0,0,.2);}
.modal-title{font-family:var(--font-h);font-size:1.5rem;margin-bottom:20px;color:var(--dark);}
.modal-top-bar{height:4px;background:linear-gradient(to right,var(--red),var(--red2));border-radius:18px 18px 0 0;margin:-32px -32px 24px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}

.actions-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}

.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
.course-card{
  background:var(--white);border:1.5px solid var(--border);border-radius:14px;
  padding:22px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.course-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}
.course-card:hover{border-color:var(--red);transform:translateY(-3px);box-shadow:0 12px 32px rgba(192,57,43,.12);}
.course-card-name{font-weight:700;font-size:1rem;margin-bottom:6px;color:var(--dark);}
.course-card-desc{color:var(--muted);font-size:.82rem;margin-bottom:14px;line-height:1.5;}
.course-card-meta{display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--muted);}

.empty-state{text-align:center;padding:48px;color:var(--muted);}
.empty-state .emoji{font-size:2.5rem;margin-bottom:12px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* FOOTER STRIP */
.sidebar-footer{margin-top:auto;padding:16px 14px 8px;border-top:1px solid var(--border);text-align:center;}
.sidebar-footer img{height:28px;opacity:.5;}
.sidebar-footer p{font-size:.68rem;color:var(--muted);margin-top:6px;}
</style>
</head>

function fillDemo(e,p){document.getElementById('login-email').value=e;document.getElementById('login-pass').value=p;}
function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value.trim();
  const user=db.users.find(u=>u.email===email&&u.password===pass);
  if(!user){document.getElementById('login-error').style.display='block';return;}
  document.getElementById('login-error').style.display='none';
  currentUser=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('topbar-name').textContent=user.name;
  const rb=document.getElementById('topbar-role');
  rb.textContent=user.role; rb.className='role-badge role-'+user.role;
  buildSidebar(); showPage('dashboard');
}
function logout(){
  currentUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
}

const navConfig={
  Admin:[{id:'dashboard',icon:'🏠',label:'Dashboard'},{section:'Management'},{id:'users',icon:'👥',label:'Users'},{id:'courses',icon:'📚',label:'Courses'},{section:'Analytics'},{id:'reports',icon:'📊',label:'Reports'}],
  Instructor:[{id:'dashboard',icon:'🏠',label:'Dashboard'},{section:'Teaching'},{id:'my-courses',icon:'📚',label:'My Courses'},{id:'grades',icon:'✏️',label:'Enter Grades'}],
  Student:[{id:'dashboard',icon:'🏠',label:'Dashboard'},{section:'Academic'},{id:'my-courses',icon:'📚',label:'My Courses'},{id:'enroll',icon:'➕',label:'Enroll'},{id:'my-grades',icon:'📈',label:'My Grades'}],
};
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  // keep logo div
  const logo=sb.querySelector('.sidebar-logo');
  sb.innerHTML='';
  sb.appendChild(logo);
  const items=navConfig[currentUser.role]||[];
  items.forEach(item=>{
    if(item.section){const s=document.createElement('div');s.className='nav-section';s.textContent=item.section;sb.appendChild(s);}
    else{const d=document.createElement('div');d.className='nav-item';d.id='nav-'+item.id;d.innerHTML=`<span class="icon">${item.icon}</span>${item.label}`;d.onclick=()=>showPage(item.id);sb.appendChild(d);}
  });
  // footer
  const footer=document.createElement('div');
  footer.className='sidebar-footer';
  footer.innerHTML='<p>Egyptian Chinese University<br/>CIS Faculty Portal</p>';
  sb.appendChild(footer);
}

let currentPage='';
function showPage(id){
  currentPage=id;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+id);
  if(nav)nav.classList.add('active');
  document.getElementById('main-content').innerHTML=renderPage(id);
}
function renderPage(id){
  const pages={dashboard:renderDashboard,users:renderUsers,courses:renderAdminCourses,reports:renderReports,'my-courses':renderMyCourses,grades:renderGrades,enroll:renderEnroll,'my-grades':renderMyGrades};
  return(pages[id]||(() =>'<div class="empty-state"><div class="emoji">🚧</div><p>Coming soon.</p></div>'))();
}

function renderDashboard(){
  const role=currentUser.role;
  let stats='',extra='';
  if(role==='Admin'){
    const st=db.users.filter(u=>u.role==='Student').length;
    const ins=db.users.filter(u=>u.role==='Instructor').length;
    stats=`<div class="stats-grid">
      <div class="stat-card red"><div class="stat-num">${st}</div><div class="stat-label">Total Students</div></div>
      <div class="stat-card blue"><div class="stat-num">${ins}</div><div class="stat-label">Instructors</div></div>
      <div class="stat-card green"><div class="stat-num">${db.courses.length}</div><div class="stat-label">Active Courses</div></div>
      <div class="stat-card orange"><div class="stat-num">${calcAvgGPA()}</div><div class="stat-label">Avg GPA</div></div>
    </div>`;
    extra=`<div class="card"><div class="card-title"><div class="card-title-left"><div class="card-title-bar"></div>All Courses</div></div>${courseTable(db.courses)}</div>`;
  } else if(role==='Instructor'){
    const mc=db.courses.filter(c=>c.instructorId===currentUser.id);
    stats=`<div class="stats-grid">
      <div class="stat-card red"><div class="stat-num">${mc.length}</div><div class="stat-label">My Courses</div></div>
      <div class="stat-card green"><div class="stat-num">${mc.reduce((a,c)=>a+c.students.length,0)}</div><div class="stat-label">My Students</div></div>
      <div class="stat-card blue"><div class="stat-num">${mc.reduce((a,c)=>a+c.assignments.length,0)}</div><div class="stat-label">Assignments</div></div>
    </div>`;
    extra=`<div class="card"><div class="card-title"><div class="card-title-left"><div class="card-title-bar"></div>My Courses</div></div>${courseTable(mc)}</div>`;
  } else {
    const mc=db.courses.filter(c=>c.students.includes(currentUser.id));
    const gpa=calcStudentGPA(currentUser.id);
    stats=`<div class="stats-grid">
      <div class="stat-card red"><div class="stat-num">${mc.length}</div><div class="stat-label">Enrolled</div></div>
      <div class="stat-card green"><div class="stat-num">${gpa}</div><div class="stat-label">My GPA</div></div>
      <div class="stat-card blue"><div class="stat-num">${(currentUser.grades||[]).length}</div><div class="stat-label">Graded</div></div>
    </div>`;
    extra=`<div class="card"><div class="card-title"><div class="card-title-left"><div class="card-title-bar"></div>Enrolled Courses</div></div>${courseTable(mc)}</div>`;
  }
  return `<div class="page active">
    <div class="welcome-banner">
      <div style="display:flex;align-items:center">
        <div class="red-bar"></div>
        <div><h2>Welcome, ${currentUser.name.split(' ')[0]} 👋</h2><p>Egyptian Chinese University — CIS Faculty Portal</p></div>
      </div>
    </div>
    ${stats}${extra}
  </div>`;
}

function courseTable(courses){
  if(!courses.length)return'<div class="empty-state"><div class="emoji">📭</div><p>No courses.</p></div>';
  return`<table><thead><tr><th>ID</th><th>Course Name</th><th>Instructor</th><th>Students</th><th>Enrollment</th></tr></thead><tbody>
    ${courses.map(c=>{const inst=db.users.find(u=>u.id===c.instructorId);const pct=Math.round(c.students.length/c.capacity*100);
    return`<tr>
      <td><span class="tag tag-grey">#${c.id}</span></td>
      <td><strong>${c.name}</strong><br/><span style="color:var(--muted);font-size:.76rem">${c.description.slice(0,42)}…</span></td>
      <td>${inst?inst.name:'<span style="color:var(--muted)">TBA</span>'}</td>
      <td>${c.students.length}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${pct}%"></div></div><span style="font-size:.76rem;color:var(--muted)">${c.students.length}/${c.capacity}</span></div></td>
    </tr>`;}).join('')}
  </tbody></table>`;
}

function openAddUserModal(role){
  openModal(`Add ${role}`,`
    <div class="field"><label>Full Name</label><input id="m-name" type="text" placeholder="e.g. Sara Ahmed"/></div>
    <div class="field"><label>Email</label><input id="m-email" type="email" placeholder="sara@ecu.edu.eg"/></div>
    <div class="field"><label>Password</label><input id="m-pass" type="password" placeholder="••••••"/></div>
    ${role==='Instructor'?'<div class="field"><label>Department</label><input id="m-dept" type="text" placeholder="e.g. Computer Science"/></div>':''}
  `,[{label:'Cancel',cls:'btn btn-sm',action:'closeModal()'},{label:`Add ${role}`,cls:'btn btn-red',action:`addUser('${role}')`}]);
}
function addUser(role){
  const name=document.getElementById('m-name').value.trim();
  const email=document.getElementById('m-email').value.trim();
  const pass=document.getElementById('m-pass').value.trim();
  if(!name||!email||!pass){alert('Fill all fields.');return;}
  const user={id:db.nextUserId++,name,email,password:pass,role,courses:[],grades:[]};
  if(role==='Instructor')user.department=(document.getElementById('m-dept')||{}).value||'General';
  db.users.push(user);closeModal();showPage('users');showToast(`${role} added!`,'success');
}
function removeUser(id){
  if(!confirm('Remove this user?'))return;
  const idx=db.users.findIndex(u=>u.id===id);
  if(idx>-1)db.users.splice(idx,1);
  showPage('users');showToast('User removed.','error');
}

function openAddCourseModal(){
  const instructors=db.users.filter(u=>u.role==='Instructor');
  openModal('New Course',`
    <div class="field"><label>Course Name</label><input id="m-cname" type="text" placeholder="e.g. Algorithms"/></div>
    <div class="field"><label>Description</label><input id="m-cdesc" type="text" placeholder="Brief description"/></div>
    <div class="field"><label>Instructor</label><select id="m-cinst"><option value="">-- Select --</option>${instructors.map(i=>`<option value="${i.id}">${i.name}</option>`).join('')}</select></div>
    <div class="field"><label>Max Capacity</label><input id="m-ccap" type="number" value="30" min="1"/></div>
  `,[{label:'Cancel',cls:'btn btn-sm',action:'closeModal()'},{label:'Create Course',cls:'btn btn-red',action:'addCourse()'}]);
}
function addCourse(){
  const name=document.getElementById('m-cname').value.trim();
  const desc=document.getElementById('m-cdesc').value.trim();
  const instId=parseInt(document.getElementById('m-cinst').value)||null;
  const cap=parseInt(document.getElementById('m-ccap').value)||30;
  if(!name){alert('Name required.');return;}
  const course={id:db.nextCourseId++,name,description:desc,instructorId:instId,capacity:cap,students:[],assignments:[]};
  db.courses.push(course);
  if(instId){const inst=db.users.find(u=>u.id===instId);if(inst){inst.courses=inst.courses||[];inst.courses.push(course.id);}}
  closeModal();showPage('courses');showToast(`"${name}" created!`,'success');
}
function removeCourse(id){
  if(!confirm('Remove this course?'))return;
  const idx=db.courses.findIndex(c=>c.id===id);if(idx>-1)db.courses.splice(idx,1);
  showPage('courses');showToast('Course removed.','error');
}
function openCourseDetail(id){
  const c=db.courses.find(cc=>cc.id===id);if(!c)return;
  const students=c.students.map(sid=>db.users.find(u=>u.id===sid)).filter(Boolean);
  openModal(c.name,`
    <p style="color:var(--muted);margin-bottom:16px;font-size:.88rem">${c.description}</p>
    <strong style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">Students (${students.length}/${c.capacity})</strong>
    <div style="margin-top:10px;margin-bottom:18px;display:flex;flex-direction:column;gap:6px">
      ${students.length?students.map(s=>`<div style="display:flex;justify-content:space-between;padding:8px 12px;background:#fafbfc;border:1px solid var(--border);border-radius:8px;font-size:.87rem"><span>${s.name}</span><span style="color:var(--red);font-weight:600">${calcStudentGPA(s.id)} GPA</span></div>`).join(''):'<div style="color:var(--muted);font-size:.85rem">No students.</div>'}
    </div>
    <strong style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">Assignments (${c.assignments.length})</strong>
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
      ${c.assignments.length?c.assignments.map(a=>`<div style="display:flex;justify-content:space-between;padding:8px 12px;background:#fafbfc;border:1px solid var(--border);border-radius:8px;font-size:.87rem"><span>${a.title}</span><span style="color:var(--muted)">Max: ${a.maxScore}</span></div>`).join(''):'<div style="color:var(--muted);font-size:.85rem">No assignments.</div>'}
    </div>
  `,[{label:'Close',cls:'btn btn-sm',action:'closeModal()'}]);
}

  </div>`;
}
function openAddAssignmentModal(){
  const mc=db.courses.filter(c=>c.instructorId===currentUser.id);
  openModal('Add Assignment',`
    <div class="field"><label>Course</label><select id="m-acid">${mc.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
    <div class="field"><label>Title</label><input id="m-atitle" type="text" placeholder="Assignment title"/></div>
    <div class="field"><label>Max Score</label><input id="m-ascore" type="number" value="100" min="1"/></div>
  `,[{label:'Cancel',cls:'btn btn-sm',action:'closeModal()'},{label:'Add',cls:'btn btn-red',action:'addAssignment()'}]);
}
function addAssignment(){
  const cid=parseInt(document.getElementById('m-acid').value);
  const title=document.getElementById('m-atitle').value.trim();
  const maxScore=parseFloat(document.getElementById('m-ascore').value)||100;
  if(!title){alert('Title required.');return;}
  const course=db.courses.find(c=>c.id===cid);
  if(course)course.assignments.push({id:db.nextAssignId++,title,maxScore});
  closeModal();showPage('my-courses');showToast('Assignment added!','success');
}

function renderGrades(){
  const mc=db.courses.filter(c=>c.instructorId===currentUser.id);
  return`<div class="page active">
    <div class="page-title">Enter Grades</div><div class="page-sub">Assign grades to your students.</div>
    ${mc.map(c=>{const studs=c.students.map(sid=>db.users.find(u=>u.id===sid)).filter(Boolean);
    return`<div class="card"><div class="card-title"><div class="card-title-left"><div class="card-title-bar"></div>${c.name}</div></div>
      ${studs.length?`<table><thead><tr><th>Student</th><th>Current</th><th>New Grade</th><th></th></tr></thead><tbody>
        ${studs.map(s=>{const g=(s.grades||[]).find(gg=>gg.courseId===c.id);
        return`<tr><td><strong>${s.name}</strong></td><td><strong style="color:var(--red)">${g?g.grade+'%':'—'}</strong></td>
          <td><input type="number" min="0" max="100" value="${g?g.grade:''}" placeholder="0–100" id="grade-${c.id}-${s.id}" style="background:#fafbfc;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--dark);font-family:var(--font-b);width:85px;outline:none"/></td>
          <td><button class="btn btn-success btn-sm" onclick="saveGrade(${c.id},${s.id})">Save</button></td></tr>`;}).join('')}
      </tbody></table>`:'<div class="empty-state" style="padding:20px"><p>No students enrolled.</p></div>'}
    </div>`;}).join('')}
  </div>`;
}
function saveGrade(courseId,studentId){
  const val=parseFloat(document.getElementById(`grade-${courseId}-${studentId}`).value);
  if(isNaN(val)||val<0||val>100){alert('Enter a valid grade (0–100).');return;}
  const s=db.users.find(u=>u.id===studentId);if(!s)return;
  s.grades=s.grades||[];
  const ex=s.grades.find(g=>g.courseId===courseId);
  if(ex)ex.grade=val;else s.grades.push({courseId,grade:val});
  showToast('Grade saved!','success');
}

function renderEnroll(){
  const available=db.courses.filter(c=>!c.students.includes(currentUser.id)&&c.students.length<c.capacity);
  return`<div class="page active">
    <div class="page-title">Enroll in Courses</div><div class="page-sub">Browse available courses and enroll.</div>
    <div class="course-grid">
      ${available.length?available.map(c=>{const inst=db.users.find(u=>u.id===c.instructorId);
      return`<div class="course-card">
        <div class="course-card-name">${c.name}</div><div class="course-card-desc">${c.description}</div>
        <div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:.76rem;color:var(--muted);margin-bottom:4px"><span>Available spots</span><span>${c.capacity-c.students.length} left</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.round(c.students.length/c.capacity*100)}%"></div></div></div>
        <div class="course-card-meta"><span>🎓 ${inst?inst.name:'TBA'}</span><button class="btn btn-success btn-sm" onclick="enrollInCourse(${c.id})">Enroll</button></div>
      </div>`;}).join(''):'<div class="empty-state"><div class="emoji">✅</div><p>You are enrolled in all available courses!</p></div>'}
    </div>
  </div>`;
}
function enrollInCourse(courseId){
  const course=db.courses.find(c=>c.id===courseId);if(!course)return;
  course.students.push(currentUser.id);currentUser.courses=currentUser.courses||[];currentUser.courses.push(courseId);
  showPage('enroll');showToast(`Enrolled in ${course.name}!`,'success');
}
function dropCourse(courseId){
  if(!confirm('Drop this course?'))return;
  const course=db.courses.find(c=>c.id===courseId);
  if(course)course.students=course.students.filter(s=>s!==currentUser.id);
  currentUser.courses=(currentUser.courses||[]).filter(c=>c!==courseId);
  showPage('my-courses');showToast('Course dropped.','error');
}

function renderMyGrades(){
  const grades=currentUser.grades||[];const gpa=calcStudentGPA(currentUser.id);
  return`<div class="page active">
    <div class="page-title">My Grades</div><div class="page-sub">Your academic performance record.</div>
    <div class="stats-grid" style="max-width:380px">
      <div class="stat-card red"><div class="stat-num">${gpa}</div><div class="stat-label">Overall GPA</div></div>
      <div class="stat-card blue"><div class="stat-num">${grades.length}</div><div class="stat-label">Graded Courses</div></div>
    </div>
    <div class="card"><div class="card-title"><div class="card-title-left"><div class="card-title-bar"></div>Grade Breakdown</div></div>
      ${grades.length?`<table><thead><tr><th>Course</th><th>Grade</th><th>Letter</th></tr></thead><tbody>
        ${grades.map(g=>{const c=db.courses.find(cc=>cc.id===g.courseId);const letter=g.grade>=90?'A':g.grade>=80?'B':g.grade>=70?'C':g.grade>=60?'D':'F';const cls=g.grade>=80?'tag-green':g.grade>=60?'tag-blue':'tag-grey';
        return`<tr><td><strong>${c?c.name:'Unknown'}</strong></td><td><strong style="color:var(--red);font-size:1.05rem">${g.grade}%</strong></td><td><span class="tag ${cls}">${letter}</span></td></tr>`;}).join('')}
      </tbody></table>`:'<div class="empty-state"><div class="emoji">📋</div><p>No grades yet.</p></div>'}
    </div>
  </div>`;
}

function calcStudentGPA(uid){const u=db.users.find(u=>u.id===uid);if(!u||!u.grades||!u.grades.length)return'0.00';const avg=u.grades.reduce((a,g)=>a+g.grade,0)/u.grades.length;return avg.toFixed(2);}
function calcAvgGPA(){const students=db.users.filter(u=>u.role==='Student'&&u.grades&&u.grades.length);if(!students.length)return'0.00';const total=students.reduce((a,s)=>a+parseFloat(calcStudentGPA(s.id)),0);return(total/students.length).toFixed(2);}

function openModal(title,body,actions){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-actions').innerHTML=actions.map(a=>`<button class="${a.cls}" onclick="${a.action}">${a.label}</button>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

function showToast(msg,type){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:24px;right:24px;z-index:999;background:var(--white);border:1.5px solid ${type==='success'?'#bbf7d0':'#ffc9c9'};color:${type==='success'?'#16a34a':'var(--red)'};padding:12px 20px;border-radius:10px;font-size:.87rem;font-family:var(--font-b);box-shadow:0 8px 24px rgba(0,0,0,.12);animation:fadeUp .3s ease both;font-weight:500`;
  t.textContent=(type==='success'?'✅ ':'❌ ')+msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}
</script>
</body>
</html>
